<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760">
  <rect width="1000" height="760" fill="#ffffff"/>
  <text x="500" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#242424">Triunghiul financiar - Szabo Mihai Gabriel</text>
  <text x="500" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444444">06 -&gt; 6 | 11 -&gt; 2 | 1984 -&gt; 4 | 6 + 2 + 4 = 12 -&gt; 3</text>

  <!-- Isosceles triangle with apex angle 36 degrees and base angles 72 degrees. -->
  <polygon points="500,82 299,700 701,700" fill="#ff1017" stroke="#1f1f1f" stroke-width="4" stroke-linejoin="round"/>

  <text x="500" y="678" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="116" font-weight="900" fill="#2b2b2b">6243</text>

  <text x="500" y="728" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444444">apex 36 grade | unghiuri baza 72 si 72 grade</text>
  <text x="980" y="745" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#aaa" font-weight="800">Atlas Numerologie</text>
</svg>

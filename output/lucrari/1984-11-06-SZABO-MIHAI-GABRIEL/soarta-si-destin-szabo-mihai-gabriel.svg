<text class="small" x="0.0" y="210.0">Intalniri: pozitiile 5, 6, 7</text>
<text class="small" x="0.0" y="233.0">Rascruci: pozitiile 1, 2, 3 si 4</text>
  </g>
  <g transform="translate(60,640)"><text class="subtitle" x="0.0" y="0.0">Sinteza: pentru Mihai folosim intervale de 10 ani, deoarece data are predominanta impara / masculina.</text><text class="subtitle" x="0.0" y="24.0">Liniile sunt apropiate; rascrucile apar la 0, 10, 20 si 30 de ani, unde destinul ridica 1 la 3, coboara 2 la 1, ridica 1 la 9 si ridica 2 la 6.</text></g>

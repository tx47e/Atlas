<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000">
  <title>Septagrama - Birsan Daniel Robert - 19.02.1998</title>
  <desc>Septagrama regulata a ciclului de 7 ani, cu momente de criza si sens de curgere.</desc>
  <defs>
    <marker id="arrow-orange" markerWidth="13" markerHeight="13" refX="10.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,9 L10.5,4.5 z" fill="#ff9800"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .star { fill: none; stroke: #3f3f3f; stroke-width: 5.6; stroke-linejoin: round; stroke-linecap: round; }
      .flow { fill: none; stroke: #ff9800; stroke-width: 2.2; stroke-linejoin: round; stroke-linecap: round; marker-end: url(#arrow-orange); }
      .node { fill: #ff9800; }
      .node-text { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 800; fill: #111; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 800; fill: #111; }
      .txt { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #000; }
      .edge { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #000; }
      .bold { font-weight: 800; }
      .orange { fill: #ff9800; font-weight: 800; }
      .green { fill: #00b000; font-weight: 800; text-decoration: underline; }
      .muted { fill: #666; }
      .label-bg { fill: #fff; opacity: 0.92; }
      .foot { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #aaa; font-weight: 800; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1000"/>

  <circle class="node" cx="84" cy="52" r="10"/>
  <text class="title orange" x="110" y="61">Fiecare varf = Moment de criza</text>

  <!-- Septagrama regulata: varfuri pe cerc, traseu {7/3}. -->
  <g id="diagram">
    <g transform="translate(0,0)">
      <polyline class="star" points="760,140 916.2,824.3 478.5,275.5 1111,580.1 409,580.1 1041.5,275.5 603.8,824.3 760,140"/>
      <!-- Orange direction arrows are offset and stop before the nodes so the arrowheads stay visible. -->
      <line class="flow" x1="778.4" y1="166.6" x2="919.0" y2="782.6"/>
      <line class="flow" x1="888.1" y1="808.3" x2="494.1" y2="314.3"/>
      <line class="flow" x1="510.7" y1="277.7" x2="1080.2" y2="551.9"/>
      <line class="flow" x1="1081.0" y1="592.1" x2="449.0" y2="592.1"/>
      <line class="flow" x1="430.8" y1="556.3" x2="1000.3" y2="282.0"/>
      <line class="flow" x1="1032.2" y1="306.4" x2="638.1" y2="800.5"/>
      <line class="flow" x1="598.8" y1="792.4" x2="739.4" y2="176.3"/>
    </g>

    <!-- Nodes -->
    <circle class="node" cx="760" cy="140" r="20"/><text class="node-text" x="744" y="147">1/8</text>
    <circle class="node" cx="1041.5" cy="275.5" r="20"/><text class="node-text" x="1026" y="282">2/6</text>
    <circle class="node" cx="1111" cy="580.1" r="20"/><text class="node-text" x="1093" y="587">3/10</text>
    <circle class="node" cx="916.2" cy="824.3" r="20"/><text class="node-text" x="898" y="831">4/11</text>
    <circle class="node" cx="603.8" cy="824.3" r="20"/><text class="node-text" x="589" y="831">5/9</text>
    <circle class="node" cx="409" cy="580.1" r="20"/><text class="node-text" x="394" y="587">3/7</text>
    <circle class="node" cx="478.5" cy="275.5" r="20"/><text class="node-text" x="463" y="282">1/5</text>

    <!-- Edge labels follow the septagram edges and sit just beside the line, toward the nearest star point. -->
    <g class="edge">
      <g transform="translate(816.6 235.1) rotate(77.1)" text-anchor="middle">
        <text x="0" y="-8">0 - 3,5 ani</text>
        <text x="0" y="8">49 - 52,5 ani</text>
      </g>
      <g transform="translate(925.9 714.1) rotate(77.1)" text-anchor="middle">
        <text x="0" y="-8">3,5 - 7 ani</text>
        <text x="0" y="8">52,5 - 56 ani</text>
      </g>
      <g transform="translate(814.6 770.7) rotate(51.4)" text-anchor="middle">
        <text x="0" y="-8">7 - 10,5 ani</text>
        <text x="0" y="8">56 - 59,5 ani</text>
      </g>
      <g transform="translate(508.2 386.5) rotate(51.4)" text-anchor="middle">
        <text x="0" y="-8">10,5 - 14 ani</text>
        <text x="0" y="8">59,5 - 63 ani</text>
      </g>
      <g transform="translate(588.1 290.6) rotate(25.7)" text-anchor="middle">
        <text x="0" y="-8">14 - 17,5 ani</text>
        <text x="0" y="8">63 - 66,5 ani</text>
      </g>
      <g transform="translate(1030.9 503.8) rotate(25.7)" text-anchor="middle">
        <text x="0" y="-8">17,5 - 21 ani</text>
        <text x="0" y="8">66,5 - 70 ani</text>
      </g>
      <g transform="translate(1005.7 626.1) rotate(0.0)" text-anchor="middle">
        <text x="0" y="-8">21 - 24,5 ani</text>
        <text x="0" y="8">70 - 73,5 ani</text>
      </g>
      <g transform="translate(514.3 626.1) rotate(0.0)" text-anchor="middle">
        <text x="0" y="-8">24,5 - 28 ani</text>
        <text x="0" y="8">73,5 - 77 ani</text>
      </g>
      <g transform="translate(489.1 503.8) rotate(-25.7)" text-anchor="middle">
        <text x="0" y="-8">28 - 31,5 ani</text>
        <text x="0" y="8">77 - 80,5 ani</text>
      </g>
      <g transform="translate(931.9 290.6) rotate(-25.7)" text-anchor="middle">
        <text x="0" y="-8">31,5 - 35 ani</text>
        <text x="0" y="8">80,5 - 84 ani</text>
      </g>
      <g transform="translate(1011.8 386.5) rotate(-51.4)" text-anchor="middle">
        <text x="0" y="-8">35 - 38,5 ani</text>
        <text x="0" y="8">84,5 - 87,5 ani</text>
      </g>
      <g transform="translate(705.4 770.7) rotate(-51.4)" text-anchor="middle">
        <text x="0" y="-8">38,5 - 42 ani</text>
        <text x="0" y="8">87,5 - 91 ani</text>
      </g>
      <g transform="translate(594.1 714.1) rotate(-77.1)" text-anchor="middle">
        <text x="0" y="-8">42 - 45,5 ani</text>
        <text x="0" y="8">91 - 94,5 ani</text>
      </g>
      <g transform="translate(703.4 235.1) rotate(-77.1)" text-anchor="middle">
        <text x="0" y="-8">45,5 - 49 ani</text>
        <text x="0" y="8">94,5 - 98 ani</text>
      </g>
    </g>
  </g>

  <!-- Text blocks kept outside the drawing area. -->
  <g class="txt">
    <text x="900" y="36" class="bold">C1:1998 - 2004</text>
    <text x="900" y="66">0-7 ani. <tspan class="orange">3,5 ani</tspan> <tspan class="bold">2001</tspan> (al 4-lea an de viata)</text>
    <text x="900" y="96" class="bold">C8:2047 - 2053</text>
    <text x="900" y="126">49-56 ani. <tspan class="orange">52,5 ani</tspan> <tspan class="bold">2050</tspan> (al 53-lea an de viata)</text>

    <text x="1125" y="238" class="bold">C2:2005 - 2011</text>
    <text x="1125" y="268">7-14 ani. <tspan class="orange">10,5 ani</tspan> <tspan class="bold">2008</tspan> (al 11-lea an de viata)</text>
    <text x="1125" y="302" class="bold">C9:2054 - 2060</text>
    <text x="1125" y="332">56-63 ani. <tspan class="orange">59,5 ani</tspan> <tspan class="bold">2057</tspan> (al 60-lea an de viata)</text>

    <text x="1200" y="520" class="bold">C3:2012 - 2018</text>
    <text x="1200" y="550">14-21 ani. <tspan class="orange">17,5 ani</tspan> <tspan class="bold">2015</tspan></text>
    <text x="1200" y="580">(al 18-lea an de viata)</text>
    <text x="1200" y="615" class="bold">C10:2061 - 2067</text>
    <text x="1200" y="645">63-70 ani. <tspan class="orange">66,5 ani</tspan> <tspan class="bold">2064</tspan></text>
    <text x="1200" y="675">(al 67-lea an de viata)</text>

    <text x="950" y="790" class="bold">C4:2019 - 2025</text>
    <text x="950" y="820">21-28 ani. <tspan class="orange">24,5 ani</tspan> <tspan class="bold">2022</tspan> (al 25-lea an de viata)</text>
    <text x="950" y="855" class="bold">C11:2068 - 2074</text>
    <text x="950" y="885">70-77 ani. <tspan class="orange">73,5 ani</tspan> <tspan class="bold">2071</tspan> (al 74-lea an de viata)</text>

    <text x="360" y="802" class="green">C5:2026 - 2032</text>
    <text x="40" y="832" class="green">28-35 ani. 31,5 ani 2029 (al 32-lea an de viata)</text>
    <text x="360" y="868" class="bold">C12:2075 - 2081</text>
    <text x="40" y="898">77-84 ani. <tspan class="orange">80,5 ani</tspan> <tspan class="bold">2078</tspan> (al 81-lea an de viata)</text>

    <text x="70" y="520" class="bold">C6:2033 - 2039</text>
    <text x="70" y="550">35-42 ani. <tspan class="orange">38,5 ani</tspan> <tspan class="bold">2036</tspan></text>
    <text x="102" y="580">(al 39-lea an de viata)</text>
    <text x="70" y="615" class="bold">C13:2082 - 2088</text>
    <text x="70" y="645">84-91 ani. <tspan class="orange">87,5 ani</tspan> <tspan class="bold">2085</tspan></text>
    <text x="102" y="675">(al 88-lea an de viata)</text>

    <text x="60" y="185" class="bold">C7:2040 - 2046</text>
    <text x="60" y="215">42-49 ani. <tspan class="orange">45,5 ani</tspan> <tspan class="bold">2043</tspan> (al 46-lea an</text>
    <text x="60" y="245">de viata)</text>
    <text x="60" y="285" class="bold">C14:2089 - 2095</text>
    <text x="60" y="315">91-98 ani. <tspan class="orange">94,5 ani</tspan> <tspan class="bold">2092</tspan> (al 95-lea an</text>
    <text x="60" y="345">de viata)</text>
  </g>

  <g class="edge">
    <text x="1330" y="944" class="bold muted">Sens de curgere:</text>
    <line class="flow" x1="1465" y1="939" x2="1545" y2="939"/>
  </g>
  <text class="foot" x="1420" y="985">ATLAS NUMEROLOGIE</text>
</svg>



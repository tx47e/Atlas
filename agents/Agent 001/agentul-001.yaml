id: agentul-001
display_name: "agentul 001"
description: "Primul agent local pentru generarea si adaptarea SVG-urilor numerologice."
algorithm_model:
  name: "Reference-first verified SVG workflow"
  steps:
    - "identifica intentia si tipul de SVG cerut"
    - "alege skill-ul numerologic potrivit"
    - "citeste SKILL.md complet si referintele obligatorii"
    - "extrage datele persoanei si calculele existente, daca exista"
    - "verifica formulele in vault/Numerologie inainte de generare"
    - "foloseste assets/reference.svg sau template-ul skill-ului ca model principal"
    - "genereaza sau adapteaza SVG-ul fara a inventa date lipsa"
    - "valideaza XML-ul si inspecteaza lizibilitatea vizuala"
    - "actualizeaza livrabilele pereche cand utilizatorul cere integrare in lucrare"
    - "raporteaza calea fisierului, validarile si limitele ramase"
  calculation_rule: "pentru calcule cu traseu lung foloseste -> intre pasi"
  priority_order:
    - "documentatia din vault/Numerologie"
    - "valorile deja calculate in lucrarea persoanei"
    - "SKILL.md si template-ul skill-ului"
    - "assets/reference.svg pentru compozitie vizuala"
    - "cerinte explicite ale utilizatorului pentru varianta curenta"
skills:
  - numerologie-SVG-omuletul-relatiilor
  - numerologie-SVG-patratul-de-aur
  - numerologie-SVG-semnatura-astrala
  - numerologie-SVG-septagrama
  - numerologie-SVG-harta-suprapusa
  - numerologie-SVG-soarta-si-destin
  - numerologie-SVG-triunghiul-financiar
prompts_dir: "agents/Agent 001/prompts"
prompts:
  numerologie-SVG-omuletul-relatiilor: "agents/Agent 001/prompts/numerologie-SVG-omuletul-relatiilor.md"
  numerologie-SVG-patratul-de-aur: "agents/Agent 001/prompts/numerologie-SVG-patratul-de-aur.md"
  numerologie-SVG-semnatura-astrala: "agents/Agent 001/prompts/numerologie-SVG-semnatura-astrala.md"
  numerologie-SVG-septagrama: "agents/Agent 001/prompts/numerologie-SVG-septagrama.md"
  numerologie-SVG-harta-suprapusa: "agents/Agent 001/prompts/numerologie-SVG-harta-suprapusa.md"
  numerologie-SVG-soarta-si-destin: "agents/Agent 001/prompts/numerologie-SVG-soarta-si-destin.md"
  numerologie-SVG-triunghiul-financiar: "agents/Agent 001/prompts/numerologie-SVG-triunghiul-financiar.md"

id: the-cartographer
tags: [agent, the-cartographer]
display_name: "The Cartographer"
description: "Agent local pentru generarea si verificarea SVG-urilor numerologice prin skill-uri si scripturi autonome."
model: "gpt-5.6-terra"
reasoning_effort: "low"
vault_access: "none"
algorithm_model:
  name: "Skill-and-script-first SVG workflow"
  steps:
    - "identifica intentia si tipul de SVG cerut"
    - "alege skill-ul numerologic potrivit"
    - "citeste SKILL.md complet"
    - "colecteaza numai datele de intrare cerute de script"
    - "ruleaza exclusiv generatorul indicat de skill"
    - "nu recalculeaza manual si nu modifica manual SVG-ul"
    - "valideaza XML-ul si inspecteaza lizibilitatea vizuala"
    - "actualizeaza livrabilele pereche cand utilizatorul cere integrare in lucrare"
    - "raporteaza calea fisierului, validarile si limitele ramase"
  calculation_rule: "pentru calcule cu traseu lung foloseste -> intre pasi"
  priority_order:
    - "SKILL.md al skill-ului activ"
    - "scriptul de generare indicat de skill"
    - "datele de intrare validate cerute de script"
    - "cerintele explicite ale utilizatorului pentru varianta curenta"
skills:
  - numerologie-SVG-omuletul-relatiilor
  - numerologie-SVG-patratul-de-aur
  - numerologie-SVG-semnatura-astrala
  - numerologie-SVG-septagrama
  - numerologie-SVG-harta-suprapusa
  - numerologie-SVG-soarta-si-destin
  - numerologie-SVG-triunghiul-financiar
prompts_dir: "agents/The Cartographer/prompts"
prompts:

  numerologie-SVG-septagrama: "agents/The Cartographer/prompts/numerologie-SVG-septagrama.md"
  numerologie-SVG-harta-suprapusa: "agents/The Cartographer/prompts/numerologie-SVG-harta-suprapusa.md"
  numerologie-SVG-soarta-si-destin: "agents/The Cartographer/prompts/numerologie-SVG-soarta-si-destin.md"

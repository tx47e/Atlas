id: agent-lucrari
tags: [agent, agent-lucrari]
display_name: "Agent Lucrari"
description: "Agent local pentru redactarea orchestrata a lucrarilor numerologice in Markdown."
algorithm_model:
  name: "Validated calculation to narrative work workflow"
  steps:
    - "colecteaza datele persoanei, relatia optionala si tipul lucrarii"
    - "solicita Agentului Vault validarea aprobata a formulelor necesare"
    - "consuma raportul calculatorului si registrul de validare"
    - "blocheaza sectiunile dependente de formule nevalidate"
    - "selecteaza template-ul si construieste numai Markdown indexat"
    - "subcontracteaza Agentul SVG pentru toate SVG-urile necesare"
    - "verifica tonul, indexurile, calculele si continutul obligatoriu"
    - "asteapta aprobarea Markdown-ului inainte de orice HTML"
  priority_order:
    - "formulele confirmate din vault/Numerologie"
    - "registrul de validare a formulelor"
    - "raportul calculatorului numerologic"
    - "template-ul lucrarii"
    - "SVG-urile validate ale Agentului SVG"
skills:
  - numerologie-lucrare-redactare
delegation:
  agent_vault:
    agent_id: "agent-vault"
    scope: "validarea formulelor, intretinerea skill-urilor si orice scriere in vault/"
    rule: "nu lanseaza direct validarea formulelor si nu scrie in vault/"
  agent_svg:
    agent_id: "agent-svg"
    scope: "genereaza toate graficele si SVG-urile cerute de template"
    rule: "integreaza numai livrabile validate; nu dubleaza calculele sau desenul SVG"
prompts_dir: "agents/Agent Lucrari/prompts"
memory_dir: "agents/Agent Lucrari/memory"
vault_access: "read_only"
memory_policy:
  - "salveaza deciziile aprobate despre formule, template-uri si structura lucrarilor"
  - "salveaza doar rezumate durabile, cu sursa si data; nu duplica lucrari complete sau date personale inutile"
  - "la inceperea unei lucrari similare, consulta notitele relevante inainte de redactare"
prompts:
  numerologie-lucrare-redactare: "agents/Agent Lucrari/prompts/numerologie-lucrare-redactare.md"
  solicita-validare-agent-vault: "agents/Agent Lucrari/prompts/solicita-validare-agent-vault.md"

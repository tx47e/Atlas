<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720">
  <title>Pentagrama relatiilor - 19.02.1998 si 12.01.1998</title>
  <desc>Diagrama numerologica de relatie fara omulet schitat: pentagrama cu cifrele codului numerologic personal pentru doua date.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: none; stroke: #df8200; stroke-width: 6; }
      .star { fill: none; stroke: #333333; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
      .axis { stroke: #d7d7d7; stroke-width: 2; stroke-linecap: round; }
      .blue { fill: #0070c9; }
      .pink { fill: #ff00b8; }
      .dark { fill: #333333; }
      .muted { fill: #666666; }
      .soft { fill: #efefef; stroke: #d5d5d5; stroke-width: 1.5; }
      .legend { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 800; }
      .legend-small { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 800; fill: #4f4f4f; }
      .value { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; }
      .summary-title { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 800; fill: #333333; }
      .summary { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #555555; }
    </style>
  </defs>

  <rect class="bg" width="900" height="720"/>

  <text class="legend blue" x="24" y="32">Birsan Daniel Robert - 19.02.1998</text>
  <text class="legend pink" x="24" y="58">Roman Andreea Maria - 12.01.1998</text>
  <text class="legend-small" x="560" y="32">Realizare impreuna: 1 + 3 = 4</text>
  <text class="legend-small" x="560" y="58">De rezolvat impreuna: |1 - 3| = 2</text>

  <circle class="frame" cx="450" cy="372" r="248"/>
  <rect class="frame" x="238" y="174" width="424" height="420"/>

  <line class="axis" x1="450" y1="124" x2="450" y2="620"/>
  <line class="axis" x1="202" y1="372" x2="698" y2="372"/>

  <polyline class="star" points="450,104 287,607 714,297 187,297 615,607 450,104"/>

  <g>
    <rect class="soft" x="380" y="58" width="140" height="32" rx="7"/>
    <text class="value blue" x="415" y="75">111</text>
    <text class="value dark" x="450" y="75">/</text>
    <text class="value pink" x="488" y="75">1111</text>
  </g>

  <g>
    <rect class="soft" x="540" y="250" width="118" height="32" rx="7"/>
    <text class="value blue" x="568" y="267">2</text>
    <text class="value dark" x="599" y="267">/</text>
    <text class="value pink" x="631" y="267">222</text>
  </g>

  <g>
    <rect class="soft" x="742" y="304" width="124" height="32" rx="7"/>
    <text class="value blue" x="772" y="321">333</text>
    <text class="value dark" x="806" y="321">/</text>
    <text class="value pink" x="837" y="321">3</text>
  </g>

  <g>
    <rect class="soft" x="596" y="410" width="104" height="32" rx="7"/>
    <text class="value blue" x="622" y="427">0</text>
    <text class="value dark" x="649" y="427">/</text>
    <text class="value pink" x="675" y="427">4</text>
  </g>

  <g>
    <rect class="soft" x="636" y="626" width="104" height="32" rx="7"/>
    <text class="value blue" x="662" y="643">0</text>
    <text class="value dark" x="688" y="643">/</text>
    <text class="value pink" x="714" y="643">0</text>
  </g>

  <g>
    <rect class="soft" x="398" y="536" width="104" height="32" rx="7"/>
    <text class="value blue" x="424" y="553">0</text>
    <text class="value dark" x="450" y="553">/</text>
    <text class="value pink" x="476" y="553">0</text>
  </g>

  <g>
    <rect class="soft" x="160" y="626" width="104" height="32" rx="7"/>
    <text class="value blue" x="186" y="643">7</text>
    <text class="value dark" x="212" y="643">/</text>
    <text class="value pink" x="238" y="643">0</text>
  </g>

  <g>
    <rect class="soft" x="200" y="410" width="108" height="32" rx="7"/>
    <text class="value blue" x="227" y="427">8</text>
    <text class="value dark" x="254" y="427">/</text>
    <text class="value pink" x="281" y="427">8</text>
  </g>

  <g>
    <rect class="soft" x="34" y="304" width="136" height="32" rx="7"/>
    <text class="value blue" x="71" y="321">9999</text>
    <text class="value dark" x="108" y="321">/</text>
    <text class="value pink" x="141" y="321">999</text>
  </g>

  <g>
    <rect class="soft" x="249" y="250" width="112" height="32" rx="7"/>
    <text class="value blue" x="277" y="267">0</text>
    <text class="value dark" x="305" y="267">/</text>
    <text class="value pink" x="333" y="267">0</text>
  </g>

  <g>
    <text class="summary-title" x="24" y="672">Sinteza elemente</text>
    <text class="summary" x="24" y="696">Foc: 14   Apa: 4   Aer: 5   Pamant: 3   Potential/0: 2</text>
  </g>
</svg>
